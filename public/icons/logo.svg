<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1e9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" in="SourceAlpha"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- 高光 -->
  <rect x="0" y="0" width="128" height="64" rx="28" ry="28" fill="#ffffff" opacity="0.08"/>

  <!-- 书签丝带 -->
  <g filter="url(#shadow)">
    <path d="M40 26
             L88 26
             Q94 26 94 32
             L94 104
             L64 84
             L34 104
             L34 32
             Q34 26 40 26 Z"
          fill="url(#ribbon)"/>
    <!-- M 形细节（顶部） -->
    <path d="M46 64 L46 44 L64 58 L82 44 L82 64"
          stroke="#6d28d9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
